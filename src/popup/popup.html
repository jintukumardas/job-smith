<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>JobSmith</title>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">JS</span>
        <span>JobSmith</span>
      </div>
      <button id="open-options" class="icon-btn" title="Settings">⚙</button>
    </header>

    <section class="page-actions">
      <div class="section-title">This page</div>
      <div class="btn-row">
        <button id="act-autofill" class="btn primary">Autofill form</button>
        <button id="act-smartfill" class="btn" title="Use the on-device AI to fill fields it doesn't recognize">Smart Fill (AI)</button>
      </div>
      <div class="btn-row">
        <button id="act-capture" class="btn">Tailor resume</button>
        <button id="act-track" class="btn ghost">Track this page</button>
      </div>
      <div class="btn-row">
        <button id="act-clear" class="btn ghost">Clear highlights</button>
      </div>
      <div id="page-status" class="flash"></div>
    </section>

    <section class="jobs">
      <div class="section-title row">
        <span>Matched jobs</span>
        <button id="poll-now" class="link-btn">Refresh</button>
      </div>
      <div id="poll-status" class="muted small"></div>
      <div id="job-list" class="job-list"></div>
    </section>

    <footer class="footer">
      <button id="open-tracker" class="link-btn">Applications</button>
      <span class="dot">·</span>
      <button id="open-settings" class="link-btn">Settings</button>
      <span class="grow"></span>
      <span id="kill-indicator" class="badge hidden">paused</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
